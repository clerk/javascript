<!doctype html>
<html class="h-full font-sans antialiased">
  <head>
    <title>clerk-js Sandbox</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
      @theme {
        --font-sans:
          'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --font-heading:
          'Geist', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --font-mono:
          'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New',
          monospace;
        --color-sidebar: oklch(0.985 0 0);
        --color-sidebar-foreground: oklch(0.145 0 0);
        --color-sidebar-border: oklch(0.922 0 0);
        --color-sidebar-accent: oklch(0.97 0 0);
        --color-sidebar-accent-strong: oklch(0.92 0 0);
        --color-sidebar-accent-foreground: oklch(0.145 0 0);
        --color-sidebar-muted-foreground: oklch(0.556 0 0);
      }
      .dark {
        color-scheme: dark;
        --color-sidebar: oklch(0.205 0 0);
        --color-sidebar-foreground: oklch(0.985 0 0);
        --color-sidebar-border: oklch(0.274 0 0);
        --color-sidebar-accent: oklch(0.269 0 0);
        --color-sidebar-accent-strong: oklch(0.34 0 0);
        --color-sidebar-accent-foreground: oklch(0.985 0 0);
        --color-sidebar-muted-foreground: oklch(0.708 0 0);
      }
    </style>
    <script>
      (function () {
        var saved = localStorage.getItem('clerk-js-sandbox-dark-mode');
        if (saved === 'on' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
      (function () {
        if (localStorage.getItem('clerk-js-sandbox-sidebar-collapsed') === '1') {
          document.documentElement.setAttribute('data-sidebar-collapsed', '');
        }
      })();
    </script>
    <style>
      @media (min-width: 1024px) {
        [data-sidebar] {
          transition: transform 200ms ease;
        }
        body {
          transition: padding-left 200ms ease;
        }
        #sidebarExpand {
          display: flex;
          opacity: 0;
          pointer-events: none;
          transition: opacity 200ms ease;
        }
        html[data-sidebar-collapsed] [data-sidebar] {
          transform: translateX(-100%);
        }
        html[data-sidebar-collapsed] body {
          padding-left: 0 !important;
        }
        html[data-sidebar-collapsed] #sidebarExpand {
          opacity: 1;
          pointer-events: auto;
        }
      }
      @media (max-width: 1023.98px) {
        #sidebarExpand {
          display: none !important;
        }
      }
    </style>
    <!-- React Grab (development-only: this template is only used by `pnpm dev:sandbox`) -->
    <script
      src="//unpkg.com/react-grab/dist/index.global.js"
      crossorigin="anonymous"
    ></script>
    <script>
      class NavLink extends HTMLElement {
        connectedCallback() {
          var href = this.getAttribute('href');
          var label = this.getAttribute('label');
          var component = this.getAttribute('component');
          function escapeHtml(value) {
            return String(value)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;');
          }
          var componentHtml = component
            ? '<span title="' +
              escapeHtml(component) +
              '" class="max-w-[11rem] shrink truncate font-mono text-[9px]/none text-sidebar-muted-foreground group-aria-[current]:text-sidebar-accent-foreground/70" style="font-family: var(--font-mono);">' +
              escapeHtml(component) +
              '</span>'
            : '';
          this.innerHTML =
            '<a class="group relative isolate flex w-full items-center justify-between gap-2 rounded-md px-2 py-1 text-xs/relaxed text-sidebar-foreground transition-colors hover:bg-sidebar-accent hover:text-sidebar-accent-foreground aria-[current]:bg-sidebar-accent-strong aria-[current]:font-medium aria-[current]:text-sidebar-accent-foreground" href="' +
            escapeHtml(href) +
            '"><span class="min-w-0 truncate">' +
            escapeHtml(label) +
            '</span>' +
            componentHtml +
            '</a>';
        }
      }
      customElements.define('nav-link', NavLink);

      class NavGroup extends HTMLElement {
        connectedCallback() {
          queueMicrotask(() => this.setup());
        }
        setup() {
          if (this.dataset.setupComplete) return;
          this.dataset.setupComplete = 'true';

          var label = this.getAttribute('label') || '';
          var items = Array.from(this.childNodes);

          var wrapper = document.createElement('div');
          wrapper.className = 'flex flex-col gap-1';

          var heading = document.createElement('div');
          heading.className = 'px-1 text-[10px] font-medium uppercase tracking-wide text-sidebar-muted-foreground';
          heading.textContent = label;

          var inner = document.createElement('div');
          inner.className = 'flex flex-col';

          items.forEach(function (node) {
            inner.appendChild(node);
          });

          wrapper.appendChild(heading);
          wrapper.appendChild(inner);

          this.innerHTML = '';
          this.appendChild(wrapper);
        }
      }
      customElements.define('nav-group', NavGroup);
    </script>
  </head>
  <body
    class="flex min-h-full flex-col overflow-x-hidden bg-white lg:has-[*[data-sidebar]:not(.hidden)]:pl-72 dark:bg-neutral-950"
  >
    <div
      data-sidebar
      class="border-sidebar-border bg-sidebar text-sidebar-foreground fixed inset-y-0 left-0 z-40 w-72 overflow-y-auto border-r px-4 py-4 max-lg:hidden"
    >
      <header class="border-sidebar-border mb-3 flex items-center justify-start gap-x-2 border-b pb-3">
        <svg
          width="160"
          height="160"
          viewBox="0 0 160 160"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
          class="ml-2 size-5"
        >
          <rect
            width="160"
            height="160"
            rx="80"
            fill="#6C47FF"
          />
          <path
            d="M111.125 33.4395C112.875 34.6113 113.024 37.0763 111.535 38.5652L98.7464 51.3541C97.5905 52.5099 95.7974 52.6925 94.3426 51.9472C90.0408 49.7434 85.1656 48.5 80 48.5C62.603 48.5 48.5 62.603 48.5 80C48.5 85.1656 49.7434 90.0408 51.9472 94.3426C52.6925 95.7974 52.5099 97.5905 51.3541 98.7464L38.5652 111.535C37.0763 113.024 34.6113 112.875 33.4395 111.125C27.4773 102.224 24 91.5181 24 80C24 49.0721 49.0721 24 80 24C91.5181 24 102.224 27.4773 111.125 33.4395Z"
            fill="white"
            fill-opacity="0.4"
          />
          <path
            d="M97.5 80C97.5 89.665 89.665 97.5 80 97.5C70.335 97.5 62.5 89.665 62.5 80C62.5 70.335 70.335 62.5 80 62.5C89.665 62.5 97.5 70.335 97.5 80Z"
            fill="white"
          />
          <path
            d="M111.535 121.435C113.024 122.924 112.875 125.389 111.125 126.56C102.224 132.523 91.5181 136 80 136C68.4819 136 57.7759 132.523 48.8747 126.56C47.1253 125.389 46.9758 122.924 48.4647 121.435L61.2535 108.646C62.4094 107.49 64.2025 107.307 65.6573 108.053C69.9592 110.257 74.8344 111.5 80 111.5C85.1656 111.5 90.0408 110.257 94.3427 108.053C95.7975 107.307 97.5906 107.49 98.7465 108.646L111.535 121.435Z"
            fill="white"
          />
        </svg>
        <div
          class="bg-sidebar-accent text-sidebar-muted-foreground ring-sidebar-border mt-0.5 rounded-full px-2 py-1 text-[0.625rem]/3 font-medium ring-1 ring-inset"
        >
          UI Component Sandbox
        </div>
        <button
          id="sidebarCollapse"
          type="button"
          aria-label="Collapse sidebar"
          class="text-sidebar-muted-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground ml-auto inline-flex size-6 shrink-0 items-center justify-center rounded-md transition-colors max-lg:hidden"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="size-3.5"
            aria-hidden="true"
          >
            <path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" />
            <path d="M9 4v16" />
            <path d="M15 10l-2 2l2 2" />
          </svg>
        </button>
      </header>
      <nav class="flex flex-col gap-4">
        <nav-group label="Get Started">
          <nav-link
            href="/"
            label="Home"
          ></nav-link>
        </nav-group>
        <nav-group label="Auth">
          <nav-link
            href="/sign-in"
            label="Sign In"
            component="<SignIn />"
          ></nav-link>
          <nav-link
            href="/sign-up"
            label="Sign Up"
            component="<SignUp />"
          ></nav-link>
          <nav-link
            href="/waitlist"
            label="Waitlist"
            component="<Waitlist />"
          ></nav-link>
          <nav-link
            href="/oauth-consent"
            label="OAuth Consent"
            component="<OAuthConsent />"
          ></nav-link>
          <nav-link
            href="/api-keys"
            label="API Keys"
            component="<APIKeys />"
          ></nav-link>
        </nav-group>
        <nav-group label="User">
          <nav-link
            href="/user-avatar"
            label="User Avatar"
            component="<UserAvatar />"
          ></nav-link>
          <nav-link
            href="/user-button"
            label="User Button"
            component="<UserButton />"
          ></nav-link>
          <nav-link
            href="/user-profile"
            label="User Profile"
            component="<UserProfile />"
          ></nav-link>
        </nav-group>
        <nav-group label="Orgs">
          <nav-link
            href="/create-organization"
            label="Create Org"
            component="<CreateOrganization />"
          ></nav-link>
          <nav-link
            href="/organization-list"
            label="Org List"
            component="<OrganizationList />"
          ></nav-link>
          <nav-link
            href="/organization-profile"
            label="Org Profile"
            component="<OrganizationProfile />"
          ></nav-link>
          <nav-link
            href="/organization-switcher"
            label="Org Switcher"
            component="<OrganizationSwitcher />"
          ></nav-link>
          <nav-link
            href="/configure-sso"
            label="Configure SSO"
            component="<ConfigureSSO />"
          ></nav-link>
        </nav-group>
        <nav-group label="Tasks">
          <nav-link
            href="/task-choose-organization"
            label="Choose Org"
            component="<TaskChooseOrganization />"
          ></nav-link>
          <nav-link
            href="/task-setup-mfa"
            label="Setup MFA"
            component="<TaskSetupMFA />"
          ></nav-link>
        </nav-group>
        <nav-group label="Billing">
          <nav-link
            href="/pricing-table"
            label="Pricing Table"
            component="<PricingTable />"
          ></nav-link>
        </nav-group>
        <nav-group label="Mosaic">
          <nav-link
            href="/mosaic-organization-profile"
            label="Mosaic Org Profile"
            component="<__experimental_MosaicOrganizationProfile />"
          ></nav-link>
        </nav-group>
        <nav-group label="Other">
          <nav-link
            href="/keyless"
            label="Keyless"
            component="<Keyless />"
          ></nav-link>
          <nav-link
            href="/open-sign-in"
            label="Open sign in"
          ></nav-link>
          <nav-link
            href="/open-sign-up"
            label="Open sign up"
          ></nav-link>
        </nav-group>
      </nav>
    </div>

    <div
      id="sidebarExpand"
      class="border-sidebar-border bg-sidebar fixed inset-y-0 left-0 z-40 hidden h-full flex-col gap-1 border-r px-2 py-4 lg:flex"
    >
      <button
        id="sidebarExpandBtn"
        type="button"
        aria-label="Expand sidebar"
        class="text-sidebar-muted-foreground hover:bg-sidebar-accent hover:text-sidebar-accent-foreground inline-flex size-6 items-center justify-center rounded-md transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="size-4"
          aria-hidden="true"
        >
          <path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" />
          <path d="M9 4v16" />
          <path d="M13 10l2 2l-2 2" />
        </svg>
      </button>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var html = document.documentElement;
        var STORAGE_KEY = 'clerk-js-sandbox-sidebar-collapsed';
        function setCollapsed(collapsed) {
          if (collapsed) {
            html.setAttribute('data-sidebar-collapsed', '');
            localStorage.setItem(STORAGE_KEY, '1');
          } else {
            html.removeAttribute('data-sidebar-collapsed');
            localStorage.removeItem(STORAGE_KEY);
          }
        }
        document.getElementById('sidebarCollapse')?.addEventListener('click', function () {
          setCollapsed(true);
        });
        document.getElementById('sidebarExpandBtn')?.addEventListener('click', function () {
          setCollapsed(false);
        });
      });
    </script>

    <button
      id="sidebarToggle"
      class="border-sidebar-border bg-sidebar text-sidebar-foreground fixed left-3 top-3 z-50 rounded-md border p-1.5 lg:hidden"
      aria-label="Toggle sidebar"
    >
      <svg
        class="size-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
        />
      </svg>
    </button>

    <main
      class="flex h-full min-w-px flex-1 items-center justify-center overflow-y-auto overflow-x-hidden px-4 py-12 md:px-12"
    >
      <div
        id="app"
        class="container grid w-full place-content-center p-12"
      ></div>
    </main>

    <!-- This app is in the Team SDK organization. -->
    <!-- Load the UI bundle first, so window.__internal_ClerkUICtor is available -->
    <script
      type="text/javascript"
      src="<%= uiScriptUrl %>"
      crossorigin="anonymous"
    ></script>
    <script
      type="text/javascript"
      src="/<%= htmlRspackPlugin.files.js[0] %>"
      data-clerk-publishable-key="pk_test_c3VtbWFyeS1tYW4tOTkuY2xlcmsuYWNjb3VudHNzdGFnZS5kZXYk"
    ></script>
    <script
      type="text/javascript"
      src="/<%= htmlRspackPlugin.files.js[1] %>"
    ></script>
  </body>
</html>
