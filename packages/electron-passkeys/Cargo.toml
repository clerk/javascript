[package]
name = "electron_passkeys"
version = "0.0.0"
edition = "2021"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi8", "async"] }
napi-derive = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
tokio = { version = "1", features = ["sync", "rt"] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", default-features = false, features = [
  "std",
  "NSArray",
  "NSData",
  "NSError",
  "NSObject",
  "NSProcessInfo",
  "NSString",
] }
objc2-app-kit = { version = "0.3", default-features = false, features = [
  "std",
  "NSResponder",
  "NSView",
  "NSWindow",
] }
objc2-authentication-services = { version = "0.3", default-features = false, features = [
  "std",
  "ASFoundation",
  "ASAuthorization",
  "ASAuthorizationController",
  "ASAuthorizationCredential",
  "ASAuthorizationRequest",
  "ASAuthorizationPlatformPublicKeyCredentialProvider",
  "ASAuthorizationPlatformPublicKeyCredentialRegistrationRequest",
  "ASAuthorizationPlatformPublicKeyCredentialAssertionRequest",
  "ASAuthorizationSecurityKeyPublicKeyCredentialProvider",
  "ASAuthorizationSecurityKeyPublicKeyCredentialRegistrationRequest",
  "ASAuthorizationSecurityKeyPublicKeyCredentialAssertionRequest",
  "ASAuthorizationPublicKeyCredentialRegistrationRequest",
  "ASAuthorizationPublicKeyCredentialAssertionRequest",
  "ASAuthorizationPublicKeyCredentialConstants",
  "ASAuthorizationPublicKeyCredentialDescriptor",
  "ASAuthorizationPlatformPublicKeyCredentialDescriptor",
  "ASAuthorizationSecurityKeyPublicKeyCredentialDescriptor",
  "ASAuthorizationPublicKeyCredentialParameters",
] }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.61", features = [
  "Win32_Foundation",
  "Win32_Networking_WindowsWebServices",
  "Win32_System_LibraryLoader",
] }

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
