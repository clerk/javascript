name: Release
run-name: >-
  ${{
    github.event_name == 'issue_comment'
      && format('[Snapshot] Release by {0}', github.actor)
    || contains(github.event.head_commit.message, 'Version packages')
      && format('[Production] Release from {0}', github.ref_name)
    || format('[Canary] Release from {0}', github.ref_name)
  }}

on:
  push:
    branches:
      - main
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'issue_comment' && format('issue-{0}-{1}', github.event.issue.number, github.actor) || github.ref }}
  cancel-in-progress: true

jobs:
  electron-passkeys-detect-production:
    name: Detect if electron-passkeys needs native build (production)
    if: ${{ github.event_name == 'push' && github.repository == 'clerk/javascript' }}
    runs-on: ${{ vars.RUNNER_NORMAL || 'ubuntu-latest' }}
    permissions:
      contents: read
    outputs:
      needs_native: ${{ steps.detect.outputs.needs_native }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
          fetch-tags: false
          filter: blob:none

      - name: Detect if native packages need publishing
        id: detect
        run: |
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "needs_native=false" >> "$GITHUB_OUTPUT"
            echo "Pending changesets found — in version-PR mode, skipping native build"
            exit 0
          fi

          node <<'NODE'
          const { execFileSync } = require('child_process');
          const { appendFileSync } = require('fs');

          const packages = [
            ['@clerk/electron-passkeys', './packages/electron-passkeys/package.json'],
            ['@clerk/electron-passkeys-darwin-arm64', './packages/electron-passkeys/npm/darwin-arm64/package.json'],
            ['@clerk/electron-passkeys-darwin-x64', './packages/electron-passkeys/npm/darwin-x64/package.json'],
            ['@clerk/electron-passkeys-win32-arm64-msvc', './packages/electron-passkeys/npm/win32-arm64-msvc/package.json'],
            ['@clerk/electron-passkeys-win32-x64-msvc', './packages/electron-passkeys/npm/win32-x64-msvc/package.json'],
          ];

          for (const [name, packageJsonPath] of packages) {
            const { version } = require(packageJsonPath);
            try {
              execFileSync('npm', ['view', `${name}@${version}`, 'version'], { stdio: ['ignore', 'pipe', 'pipe'] });
              console.log(`${name}@${version} already exists on npm`);
            } catch (error) {
              const output = `${error.stdout || ''}\n${error.stderr || ''}`;
              if (error.status === 1 && /E404|404|No match found|not found/i.test(output)) {
                console.log(`${name}@${version} is missing from npm — native build needed`);
                appendFileSync(process.env.GITHUB_OUTPUT, 'needs_native=true\n');
                process.exit(0);
              }
              console.error(output);
              throw error;
            }
          }

          console.log('All electron-passkeys package versions already exist on npm — no native build needed');
          appendFileSync(process.env.GITHUB_OUTPUT, 'needs_native=false\n');
          NODE

  electron-passkeys-build-production:
    name: Build electron-passkeys native binaries (production)
    needs: [electron-passkeys-detect-production]
    if: needs.electron-passkeys-detect-production.outputs.needs_native == 'true'
    uses: ./.github/workflows/electron-passkeys.yml
    permissions:
      contents: read

  release:
    name: Release
    needs: [electron-passkeys-detect-production, electron-passkeys-build-production]
    if: ${{ always() && !cancelled() && github.event_name == 'push' && github.repository == 'clerk/javascript' && needs.electron-passkeys-detect-production.result == 'success' && (needs.electron-passkeys-detect-production.outputs.needs_native != 'true' || needs.electron-passkeys-build-production.result == 'success') }}
    runs-on: ${{ vars.RUNNER_NORMAL || 'ubuntu-latest' }}
    timeout-minutes: ${{ vars.TIMEOUT_MINUTES_NORMAL && fromJSON(vars.TIMEOUT_MINUTES_NORMAL) || 10 }}

    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: read
      statuses: write
      checks: write

    steps:
      - name: Echo github context
        run: echo "$GITHUB_CONTEXT"
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}

      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          show-progress: false
          # Use the PAT so pushes from `changesets/action` are authored by
          # clerk-cookie. With the default GITHUB_TOKEN, GitHub suppresses
          # the resulting `synchronize` events and CI never runs on Release
          # PR updates — forcing a manual close/reopen to re-trigger.
          token: ${{ secrets.CLERK_COOKIE_PAT }}

      - name: Setup
        id: config
        uses: ./.github/actions/init
        with:
          cache-enabled: false # OIDC publish job; do not restore poisonable cache state.
          turbo-enabled: false # Release uses --force, so turbo cache is not needed
          turbo-team: ""
          turbo-token: ""

      - name: Upgrade npm for trusted publishing
        run: npx npm@11 install -g npm@11

      - name: Build release
        run: pnpm turbo build $TURBO_ARGS --force

      - name: Assemble electron-passkeys native artifacts
        if: needs.electron-passkeys-detect-production.outputs.needs_native == 'true'
        uses: ./.github/actions/electron-passkeys-artifacts

      - name: Create Release PR
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          commit: "ci(repo): Version packages"
          title: "ci(repo): Version packages"
          publish: pnpm release
          # Workaround for https://github.com/changesets/changesets/issues/421
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.CLERK_COOKIE_PAT }}
          HUSKY: "0"
          NPM_CONFIG_PROVENANCE: true

      - name: Trigger workflows on related repos
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          retries: 3
          retry-exempt-status-codes: 400,401
          github-token: ${{ secrets.CLERK_COOKIE_PAT }}
          script: |
            const preMode = require("fs").existsSync("./.changeset/pre.json");
            if (!preMode) {
              const clerkjsVersion = require('./packages/clerk-js/package.json').version;
              const clerkUiVersion = require('./packages/ui/package.json').version;
              const nextjsVersion = require('./packages/nextjs/package.json').version;

              // NOTE: Keep in sync with the `targets` array in the "Recover downstream notifications" step below.
              const targets = [
                { repo: 'sdk-infra-workers', workflow_id: 'update-pkg-versions.yml', inputs: { clerkjsVersion, clerkUiVersion } },
                { repo: 'dashboard', workflow_id: 'prepare-nextjs-sdk-update.yml', inputs: { version: nextjsVersion } },
                { repo: 'clerk-docs', workflow_id: 'typedoc.yml' },
              ];
              const results = await Promise.allSettled(
                targets.map(t => github.rest.actions.createWorkflowDispatch({ owner: 'clerk', ref: 'main', ...t }))
              );
              const failures = results
                .map((r, i) => r.status === 'rejected' ? { target: targets[i], reason: r.reason } : null)
                .filter(Boolean);
              if (failures.length) {
                failures.forEach(f => core.error(`Dispatch to ${f.target.repo}/${f.target.workflow_id} failed: ${f.reason?.message ?? f.reason}`));
                core.setFailed(`${failures.length} downstream dispatch(es) failed`);
              }
            } else{
              core.warning("Changeset in pre-mode should not prepare a ClerkJS production release")
            }

      # Recovery: if the changesets action published to npm but then failed
      # (e.g. git push --follow-tags error), the `published` output is never
      # set and downstream repos are not notified. This step detects that
      # scenario by checking npm for the local package version and dispatches
      # if the packages are already live.
      - name: Recover downstream notifications
        if: always() && steps.changesets.conclusion == 'failure'
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          retries: 3
          retry-exempt-status-codes: 400,401
          github-token: ${{ secrets.CLERK_COOKIE_PAT }}
          script: |
            const { execSync } = require('child_process');

            const clerkjsVersion = require('./packages/clerk-js/package.json').version;
            const clerkUiVersion = require('./packages/ui/package.json').version;

            // Only recover stable releases
            const preReleases = [
              clerkjsVersion.includes('-') && `@clerk/clerk-js@${clerkjsVersion}`,
              clerkUiVersion.includes('-') && `@clerk/ui@${clerkUiVersion}`,
            ].filter(Boolean);
            if (preReleases.length > 0) {
              console.log(`Skipping recovery: ${preReleases.join(', ')} is a pre-release`);
              return;
            }

            const preMode = require("fs").existsSync("./.changeset/pre.json");
            if (preMode) {
              core.warning("Changeset in pre-mode, skipping recovery dispatch");
              return;
            }

            // Check if either version was actually published to npm
            function isPublished(name, version) {
              try {
                return execSync(`npm view ${name}@${version} version`, { encoding: 'utf8' }).trim() === version;
              } catch (e) {
                console.log(`npm view ${name}@${version} failed: ${e.message}`);
                return false;
              }
            }

            const clerkjsPublished = isPublished('@clerk/clerk-js', clerkjsVersion);
            const clerkUiPublished = isPublished('@clerk/ui', clerkUiVersion);

            if (!clerkjsPublished && !clerkUiPublished) {
              console.log('Neither @clerk/clerk-js nor @clerk/ui were published to npm, no recovery needed');
              return;
            }

            const published = [
              clerkjsPublished && `@clerk/clerk-js@${clerkjsVersion}`,
              clerkUiPublished && `@clerk/ui@${clerkUiVersion}`,
            ].filter(Boolean).join(', ');
            core.warning(`Recovery: ${published} published to npm but downstream repos were not notified. Dispatching now.`);

            const nextjsVersion = require('./packages/nextjs/package.json').version;

            // NOTE: Keep in sync with the `targets` array in the "Trigger workflows on related repos" step above.
            const targets = [
              { repo: 'sdk-infra-workers', workflow_id: 'update-pkg-versions.yml', inputs: { clerkjsVersion, clerkUiVersion } },
              { repo: 'dashboard', workflow_id: 'prepare-nextjs-sdk-update.yml', inputs: { version: nextjsVersion } },
              { repo: 'clerk-docs', workflow_id: 'typedoc.yml' },
            ];
            const results = await Promise.allSettled(
              targets.map(t => github.rest.actions.createWorkflowDispatch({ owner: 'clerk', ref: 'main', ...t }))
            );
            const failures = results
              .map((r, i) => r.status === 'rejected' ? { target: targets[i], reason: r.reason } : null)
              .filter(Boolean);
            if (failures.length) {
              failures.forEach(f => core.error(`Recovery dispatch to ${f.target.repo}/${f.target.workflow_id} failed: ${f.reason?.message ?? f.reason}`));
              core.setFailed(`${failures.length} recovery dispatch(es) failed`);
            } else {
              core.notice('Recovery dispatch completed successfully');
            }

      - name: Generate notification payload
        id: notification
        if: steps.changesets.outputs.published == 'true'
        run: payload=$(node scripts/notify.mjs '${{ steps.changesets.outputs.publishedPackages }}' '${{ github.actor }}') && echo ::set-output name=payload::${payload//$'\n'/'%0A'}

      - name: Send commit log to Slack
        id: slack
        if: steps.changesets.outputs.published == 'true'
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        with:
          payload: ${{ steps.notification.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CHANGELOG_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: ${{ always() && steps.changesets.outcome == 'failure' }}
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*:red_circle: Stable release failed*\n*Repo:* `${{ github.repository }}`\n*Workflow:* `${{ github.workflow }}`\n*Commit:* `${{ github.sha }}`\n*Triggered by:* `${{ github.actor }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SDK_SLACKER_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  electron-passkeys-changed-canary:
    name: Detect electron-passkeys changes (canary)
    if: ${{ github.event_name == 'push' && github.repository == 'clerk/javascript' }}
    runs-on: ${{ vars.RUNNER_NORMAL || 'ubuntu-latest' }}
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
          filter: blob:none

      - name: Check for electron-passkeys file changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            changed:
              - 'packages/electron-passkeys/src/**'
              - 'packages/electron-passkeys/Cargo.toml'
              - 'packages/electron-passkeys/Cargo.lock'
              - 'packages/electron-passkeys/build.rs'
              - 'packages/electron-passkeys/index.js'
              - 'packages/electron-passkeys/index.d.ts'
              - 'packages/electron-passkeys/npm/**/package.json'
              - 'packages/electron-passkeys/package.json'
              - '.github/workflows/electron-passkeys.yml'
              - '.github/workflows/release.yml'
              - '.github/actions/electron-passkeys-artifacts/**'

  electron-passkeys-build-canary:
    name: Build electron-passkeys native binaries (canary)
    needs: [electron-passkeys-changed-canary]
    if: needs.electron-passkeys-changed-canary.outputs.changed == 'true'
    uses: ./.github/workflows/electron-passkeys.yml
    permissions:
      contents: read

  canary-release:
    name: Canary release
    needs: [electron-passkeys-changed-canary, electron-passkeys-build-canary]
    if: ${{ always() && !cancelled() && github.event_name == 'push' && github.repository == 'clerk/javascript' && needs.electron-passkeys-changed-canary.result == 'success' && (needs.electron-passkeys-changed-canary.outputs.changed != 'true' || needs.electron-passkeys-build-canary.result == 'success') }}
    runs-on: ${{ vars.RUNNER_NORMAL || 'ubuntu-latest' }}
    timeout-minutes: ${{ vars.TIMEOUT_MINUTES_NORMAL && fromJSON(vars.TIMEOUT_MINUTES_NORMAL) || 10 }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
          fetch-tags: false
          filter: 'blob:none'

      - name: Setup
        id: config
        uses: ./.github/actions/init
        with:
          cache-enabled: false # OIDC publish job; do not restore poisonable cache state.
          turbo-enabled: false # Remote cache disabled in OIDC publish path.
          turbo-team: ""
          turbo-token: ""

      - name: Upgrade npm for trusted publishing
        run: npx npm@11 install -g npm@11

      - name: Assemble electron-passkeys native artifacts
        if: needs.electron-passkeys-changed-canary.outputs.changed == 'true'
        uses: ./.github/actions/electron-passkeys-artifacts

      - name: Version packages for canary
        id: version-packages
        run: |
          flag=${{ needs.electron-passkeys-changed-canary.outputs.changed == 'true' && '--include-electron-passkeys' || '' }}
          pnpm version-packages:canary $flag | tail -1 >> "$GITHUB_OUTPUT"

      - name: Build release
        if: steps.version-packages.outputs.success == '1'
        run: pnpm turbo build $TURBO_ARGS

      - name: Canary release
        id: publish
        if: steps.version-packages.outputs.success == '1'
        run: pnpm release:canary
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Trigger workflows on related repos
        if: steps.publish.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          retries: 3
          retry-exempt-status-codes: 400,401
          github-token: ${{ secrets.CLERK_COOKIE_PAT }}
          script: |
            const clerkjsVersion = require('./packages/clerk-js/package.json').version;
            const clerkUiVersion = require('./packages/ui/package.json').version;
            const nextjsVersion = require('./packages/nextjs/package.json').version;

            const targets = [
              { repo: 'sdk-infra-workers', workflow_id: 'update-pkg-versions.yml', inputs: { clerkjsVersion, clerkUiVersion, sourceCommit: context.sha } },
            ];

            if (nextjsVersion.includes('canary')) {
              console.log('clerk/nextjs changed, will notify clerk/accounts');
              targets.push(
                { repo: 'accounts', workflow_id: 'release-staging.yml', inputs: { version: nextjsVersion } },
              );
            }

            const results = await Promise.allSettled(
              targets.map(t => github.rest.actions.createWorkflowDispatch({ owner: 'clerk', ref: 'main', ...t }))
            );
            const failures = results
              .map((r, i) => r.status === 'rejected' ? { target: targets[i], reason: r.reason } : null)
              .filter(Boolean);
            if (failures.length) {
              failures.forEach(f => core.error(`Dispatch to ${f.target.repo}/${f.target.workflow_id} failed: ${f.reason?.message ?? f.reason}`));
              core.setFailed(`${failures.length} downstream dispatch(es) failed`);
            }

      - name: Notify Slack on failure
        if: ${{ always() && steps.publish.outcome == 'failure' }}
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*:red_circle: Canary release failed*\n*Repo:* `${{ github.repository }}`\n*Workflow:* `${{ github.workflow }}`\n*Commit:* `${{ github.sha }}`\n*Triggered by:* `${{ github.actor }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SDK_SLACKER_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  snapshot-preflight:
    name: Snapshot preflight
    if: ${{ github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '!snapshot') && github.repository == 'clerk/javascript' && github.event.issue.pull_request }}
    runs-on: ${{ vars.RUNNER_NORMAL || 'ubuntu-latest' }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_head_sha: ${{ steps.validate-pr.outputs.pr_head_sha }}
    steps:
      - name: Limit action to Clerk members
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          retries: 3
          retry-exempt-status-codes: 400,401
          github-token: ${{ secrets.CLERK_COOKIE_PAT }}
          script: |
            try {
              const { data } = await github.rest.orgs.getMembershipForUser({
                org: 'clerk',
                username: context.actor
              });
              if (data.state !== 'active') {
                core.setFailed(`@${context.actor} is not an active member of the Clerk organization`);
              }
            } catch (e) {
              core.setFailed(`@${context.actor} is not a member of the Clerk organization`);
            }

      - name: Validate PR source and freshness
        id: validate-pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          result-encoding: string
          retries: 3
          retry-exempt-status-codes: 400,401
          github-token: ${{ secrets.CLERK_COOKIE_PAT }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: 'clerk',
              repo: 'javascript',
              pull_number: context.issue.number,
            });

            if (pr.head.repo.full_name !== pr.base.repo.full_name) {
              core.setFailed('Snapshots are restricted to branches within clerk/javascript.');
              return;
            }

            const commentCreated = new Date(context.payload.comment.created_at);
            const prLastUpdated = new Date(pr.updated_at);

            if (prLastUpdated > commentCreated) {
              core.setFailed("The PR has been updated since !snapshot was initiated. Please review the changes and re-run the !snapshot command.");
              return;
            }

            core.setOutput('pr_head_sha', pr.head.sha);

  electron-passkeys-changed-snapshot:
    name: Detect electron-passkeys changes (snapshot)
    needs: [snapshot-preflight]
    if: ${{ always() && !cancelled() && github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '!snapshot') && github.repository == 'clerk/javascript' && github.event.issue.pull_request && needs.snapshot-preflight.result == 'success' }}
    runs-on: ${{ vars.RUNNER_NORMAL || 'ubuntu-latest' }}
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.snapshot-preflight.outputs.pr_head_sha }}
          persist-credentials: false
          fetch-depth: 0
          filter: blob:none

      - name: Check for electron-passkeys file changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          base: main
          ref: ${{ needs.snapshot-preflight.outputs.pr_head_sha }}
          filters: |
            changed:
              - 'packages/electron-passkeys/src/**'
              - 'packages/electron-passkeys/Cargo.toml'
              - 'packages/electron-passkeys/Cargo.lock'
              - 'packages/electron-passkeys/build.rs'
              - 'packages/electron-passkeys/index.js'
              - 'packages/electron-passkeys/index.d.ts'
              - 'packages/electron-passkeys/npm/**/package.json'
              - 'packages/electron-passkeys/package.json'
              - '.github/workflows/electron-passkeys.yml'
              - '.github/workflows/release.yml'
              - '.github/actions/electron-passkeys-artifacts/**'

  electron-passkeys-build-snapshot:
    name: Build electron-passkeys native binaries (snapshot)
    needs: [snapshot-preflight, electron-passkeys-changed-snapshot]
    if: needs.electron-passkeys-changed-snapshot.outputs.changed == 'true'
    uses: ./.github/workflows/electron-passkeys.yml
    with:
      ref: ${{ needs.snapshot-preflight.outputs.pr_head_sha }}
    permissions:
      contents: read

  snapshot-release:
    name: Snapshot release
    needs: [snapshot-preflight, electron-passkeys-changed-snapshot, electron-passkeys-build-snapshot]
    if: ${{ always() && !cancelled() && github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '!snapshot') && github.repository == 'clerk/javascript' && github.event.issue.pull_request && needs.snapshot-preflight.result == 'success' && needs.electron-passkeys-changed-snapshot.result == 'success' && (needs.electron-passkeys-changed-snapshot.outputs.changed != 'true' || needs.electron-passkeys-build-snapshot.result == 'success') }}
    runs-on: ${{ vars.RUNNER_LARGE || 'ubuntu-latest-l' }}
    timeout-minutes: ${{ vars.TIMEOUT_MINUTES_NORMAL && fromJSON(vars.TIMEOUT_MINUTES_NORMAL) || 10 }}

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.snapshot-preflight.outputs.pr_head_sha }}
          persist-credentials: false
          fetch-depth: 1
          fetch-tags: false
          filter: 'blob:none'

      - name: Setup
        id: config
        uses: ./.github/actions/init
        with:
          cache-enabled: false # OIDC publish job; do not restore poisonable cache state.
          turbo-enabled: false # Remote cache disabled in OIDC publish path.
          turbo-team: ""
          turbo-token: ""

      - name: Upgrade npm for trusted publishing
        run: npx npm@11 install -g npm@11

      - name: Assemble electron-passkeys native artifacts
        if: needs.electron-passkeys-changed-snapshot.outputs.changed == 'true'
        uses: ./.github/actions/electron-passkeys-artifacts

      - name: Extract snapshot name
        id: extract-snapshot-name
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const match = context.payload.comment.body.match(/!snapshot (.*)/)
            const name = match && match[1] || '';
            const isKebabCase = name.match(/^[a-z]+(-[a-z]+)*$/)
            if(name && !isKebabCase) {
              core.setFailed(`Invalid snapshot name: ${name}`);
            }
            core.setOutput('name', name);

      - name: Version packages for snapshot
        id: version-packages
        run: |
          flag=${{ needs.electron-passkeys-changed-snapshot.outputs.changed == 'true' && '--include-electron-passkeys' || '' }}
          pnpm version-packages:snapshot $flag ${{ steps.extract-snapshot-name.outputs.name }} | tail -1 >> "$GITHUB_OUTPUT"

      - name: Build release
        if: steps.version-packages.outputs.success == '1'
        run: pnpm turbo build $TURBO_ARGS

      - name: Snapshot release
        if: steps.version-packages.outputs.success == '1'
        run: pnpm release:snapshot
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Package info
        if: steps.version-packages.outputs.success == '1'
        id: package-info
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require("fs");
            const files = await (await glob.create("./packages/*/package.json")).glob();
            const descriptors = files
              .map((file) => {
                const { name, version } = JSON.parse(fs.readFileSync(file, "utf8"));
                return { name, version };
              })
              .filter(({ version }) => version.includes("-${{ steps.extract-snapshot-name.outputs.name }}"));

            let table = `| Package | Version |\n| --- | --- |\n`;
            descriptors.forEach(({ name, version }) => {
              table += `| ${name} | ${version} |\n`;
            });
            const snippets = descriptors
              .map(
                ({ name, version }) =>
                  `\`${name}\`\n\`\`\`sh\nnpm i ${name}@${version} --save-exact\n\`\`\``
              )
              .join("\n");
            core.setOutput("table", table);
            core.setOutput("snippets", snippets);

      - name: Update Comment
        if: steps.version-packages.outputs.success == '1'
        uses: peter-evans/create-or-update-comment@3383acd359705b10cb1eeef05c0e88c056ea4666 # v3.0.0
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: heart

      - name: Minimize previous snapshot comments
        if: steps.version-packages.outputs.success == '1'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const snapshotComments = comments.filter(
              (comment) =>
                comment.body?.includes('the snapshot version command generated the following package versions')
            );

            for (const comment of snapshotComments) {
              await github.graphql(`
                mutation MinimizeComment($id: ID!) {
                  minimizeComment(input: { subjectId: $id, classifier: OUTDATED }) {
                    minimizedComment {
                      isMinimized
                    }
                  }
                }
              `, { id: comment.node_id });
            }

      - name: Create snapshot release comment
        if: steps.version-packages.outputs.success == '1'
        uses: peter-evans/create-or-update-comment@3383acd359705b10cb1eeef05c0e88c056ea4666 # v3.0.0
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Hey @${{ github.event.comment.user.login }} - the snapshot version command generated the following package versions:
            ${{ steps.package-info.outputs.table }}
            Tip: Use the snippet copy button below to quickly install the required packages.
            ${{ steps.package-info.outputs.snippets }}

  # We're running the CI workflow (where node v20 modules are cached) in
  # merge_group and not on main, we need to explicitly cache node_modules here so
  # that follow-on branches can use the cached version of node_modules rather
  # than recreating them every time.
  cache-for-alternate-node-versions:
    name: Cache for Alternate Node Versions
    if: ${{ github.event_name == 'push' }}
    runs-on: ${{ vars.RUNNER_NORMAL || 'ubuntu-latest' }}
    timeout-minutes: ${{ vars.TIMEOUT_MINUTES_NORMAL && fromJSON(vars.TIMEOUT_MINUTES_NORMAL) || 10 }}
    continue-on-error: true

    permissions:
      contents: read

    strategy:
      matrix:
        version: [24] # NOTE: 20 is cached in the main release workflow

    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 1
          fetch-tags: false
          filter: "blob:none"
          show-progress: false

      - name: Cache node_modules (Node v${{ matrix.version }})
        uses: ./.github/actions/init
        with:
          cache-enabled: true
          node-version: ${{ matrix.version }}
          turbo-enabled: false
          turbo-team: ""
          turbo-token: ""
