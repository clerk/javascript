name: "Expo native build (@clerk/expo)"

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - ".github/workflows/expo-native-build.yml"
      - "packages/expo/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: expo-native-build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  EXPO_INSTANCE_NAME: with-native-components
  FIXTURE_DIR: packages/expo/e2e/native-build-fixture
  SDK_PACK_DIR: /tmp/clerk-expo-pack

jobs:
  ios:
    name: iOS
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Clerk instance keys
        id: keys
        env:
          INTEGRATION_INSTANCE_KEYS: ${{ secrets.INTEGRATION_INSTANCE_KEYS }}
        run: node scripts/resolve-instance-keys.mjs INTEGRATION_INSTANCE_KEYS "$EXPO_INSTANCE_NAME"

      - name: Build and pack @clerk/expo
        run: |
          pnpm --filter @clerk/expo... build
          mkdir -p "$SDK_PACK_DIR"
          pnpm --filter @clerk/expo pack --pack-destination "$SDK_PACK_DIR"
          SDK_TARBALL="$(ls "$SDK_PACK_DIR"/clerk-expo-*.tgz)"
          if tar -tf "$SDK_TARBALL" | grep -q '^package/e2e/'; then
            echo "Fixture files must not be packed into @clerk/expo"
            exit 1
          fi

      - name: Install fixture dependencies with packed SDK
        working-directory: ${{ env.FIXTURE_DIR }}
        run: |
          SDK_TARBALL="$(ls "$SDK_PACK_DIR"/clerk-expo-*.tgz)"
          pnpm add "$SDK_TARBALL" -w

      - name: Write fixture .env
        working-directory: ${{ env.FIXTURE_DIR }}
        run: |
          echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.keys.outputs.pk }}" > .env

      - name: Prebuild iOS fixture
        working-directory: ${{ env.FIXTURE_DIR }}
        run: pnpm prebuild:ios

      - name: Build iOS fixture
        working-directory: ${{ env.FIXTURE_DIR }}
        run: pnpm run:ios

  android:
    name: Android
    runs-on: blacksmith-8vcpu-ubuntu-2204
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Clerk instance keys
        id: keys
        env:
          INTEGRATION_INSTANCE_KEYS: ${{ secrets.INTEGRATION_INSTANCE_KEYS }}
        run: node scripts/resolve-instance-keys.mjs INTEGRATION_INSTANCE_KEYS "$EXPO_INSTANCE_NAME"

      - name: Build and pack @clerk/expo
        run: |
          pnpm --filter @clerk/expo... build
          mkdir -p "$SDK_PACK_DIR"
          pnpm --filter @clerk/expo pack --pack-destination "$SDK_PACK_DIR"
          SDK_TARBALL="$(ls "$SDK_PACK_DIR"/clerk-expo-*.tgz)"
          if tar -tf "$SDK_TARBALL" | grep -q '^package/e2e/'; then
            echo "Fixture files must not be packed into @clerk/expo"
            exit 1
          fi

      - name: Install fixture dependencies with packed SDK
        working-directory: ${{ env.FIXTURE_DIR }}
        run: |
          SDK_TARBALL="$(ls "$SDK_PACK_DIR"/clerk-expo-*.tgz)"
          pnpm add "$SDK_TARBALL" -w

      - name: Write fixture .env
        working-directory: ${{ env.FIXTURE_DIR }}
        run: |
          echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.keys.outputs.pk }}" > .env

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android fixture
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          script: |
            cd "$FIXTURE_DIR"
            pnpm prebuild:android
            pnpm run:android
