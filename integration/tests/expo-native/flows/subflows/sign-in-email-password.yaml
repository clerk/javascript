# Subflow: enter email + password into the native AuthView and submit.
# Requires CLERK_TEST_EMAIL and CLERK_TEST_PASSWORD env vars.
appId: com.clerk.exponativebuildfixture
---
- extendedWaitUntil:
    visible: 'Welcome! Sign in to continue\.?'
    timeout: 25000
# The AuthView sometimes renders its welcome text a beat before the email
# field; don't tap until the field is actually present. The placeholder
# varies by instance config (email-only vs email+username).
- extendedWaitUntil:
    visible: 'Enter your email( or username)?'
    timeout: 25000
# Clear any pre-populated identifier (Clerk persists the last-used one in
# secure-store, surviving clearState) via Select-all when the edit menu
# shows, falling back to eraseText when it doesn't (the menu is unreliable
# on a remounted AuthView on iOS). The retry gates on reaching the password
# step, so a mangled identifier gets a clean second attempt.
- retry:
    maxRetries: 2
    commands:
      - tapOn:
          text: 'Enter your email( or username)?'
      - waitForAnimationToEnd:
          timeout: 2000
      - longPressOn:
          text: 'Enter your email( or username)?'
      # iOS shows "Select All", Android shows "Select all".
      - runFlow:
          when:
            visible: 'Select [Aa]ll'
          commands:
            - tapOn:
                text: 'Select [Aa]ll'
      - eraseText: 100
      - inputText: ${CLERK_TEST_EMAIL}
      - tapOn:
          text: 'Continue'
          index: 0
      # Which first factor comes next depends on instance config AND SDK:
      # clerk-ios can go email-code-first where clerk-android goes
      # password-first. Accept either screen.
      - extendedWaitUntil:
          visible: 'Enter your password|Check your email'
          timeout: 15000
# Email-code-first: for +clerk_test@ emails the documented test code is
# 424242: https://clerk.com/docs/testing/test-emails-and-phones
- runFlow:
    when:
      visible: 'Check your email'
    commands:
      - inputText: '424242'
      - waitForAnimationToEnd:
          timeout: 5000
- runFlow:
    when:
      visible: 'Enter your password'
    commands:
      - tapOn:
          text: 'Enter your password'
      - eraseText: 50
      - inputText: ${CLERK_TEST_PASSWORD}
      - tapOn:
          text: 'Continue'
          index: 0
      - waitForAnimationToEnd:
          timeout: 5000
# Some instances ask for the email code after the password instead.
- runFlow:
    when:
      visible: 'Check your email'
    commands:
      - inputText: '424242'
      - waitForAnimationToEnd:
          timeout: 5000
# Android Google Password Manager may prompt to save the password.
- runFlow:
    when:
      visible: '.*Google Password Manager.*'
    commands:
      - tapOn:
          text: 'Not now|Never'
      - waitForAnimationToEnd:
          timeout: 2000
# iOS system Save Password / iCloud Keychain prompt overlays the app.
- runFlow:
    when:
      visible: 'Save Password|Strong Password|Use Strong Password|AutoFill Passwords'
    commands:
      - tapOn:
          text: 'Not Now|Never for This Website|Don.t Save'
          optional: true
      - waitForAnimationToEnd:
          timeout: 2000
