# Subflow: assert the user is on the signed-in home screen.
# Use extendedWaitUntil throughout so we tolerate slow CI renders after
# sign-in. assertVisible has no retry; extendedWaitUntil retries until
# the timeout elapses.
appId: com.clerk.clerkexpoquickstart
---
# Screenshot the state we landed in BEFORE the assertion so a future
# failure here has something to look at instead of just "timed out".
- takeScreenshot: debug-assert-signed-in-state
- extendedWaitUntil:
    visible: "Manage Profile"
    timeout: 20000
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 5000
- extendedWaitUntil:
    visible: "Welcome"
    timeout: 5000
