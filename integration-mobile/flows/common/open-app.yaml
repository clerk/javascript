# Subflow: launch the NativeComponentQuickstart app from a clean state.
# This is a dev build, so we must handle the Expo dev launcher and dev menu.
appId: com.clerk.clerkexpoquickstart
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 5000
# Dev build: tap the dev server URL to connect
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: "http://10.0.2.2:8081"
      - waitForAnimationToEnd:
          timeout: 8000
# Dismiss the Expo developer menu if it pops up
- runFlow:
    when:
      visible: "developer menu"
    commands:
      - tapOn:
          point: "1154,2199"
- waitForAnimationToEnd:
    timeout: 3000
# Assert the AuthView is visible (signed-out state)
- assertVisible:
    text: "Welcome! Sign in to continue."
