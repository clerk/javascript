# Happy path: Sign in with GitHub from the AuthView main screen.
# Manual-only until we have a GitHub OAuth stub.
appId: com.clerk.clerkexpoquickstart
tags:
  - happy-path
  - manual
---
- runFlow: ../common/open-app.yaml
- runFlow: ../common/assert-signed-out.yaml
- tapOn:
    text: "Sign in with GitHub"
- waitForAnimationToEnd:
    timeout: 8000
# Manual step: complete GitHub sign-in.
- runFlow: ../common/assert-signed-in.yaml
